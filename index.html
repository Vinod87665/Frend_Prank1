<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rahul Mere Bhai</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
overflow:hidden;
}

.card{
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
max-width:350px;
}

h1{
color:#ff4d6d;
}

button{
font-size:18px;
padding:12px 25px;
margin:10px;
border:none;
border-radius:25px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:black;
color:white;
position:absolute;
}

.heart{
position:fixed;
bottom:-10px;
font-size:20px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

</style>

<script>

function nextPage(){

document.body.innerHTML = `

<div class="card">

<h2>Jab mai aunga to tu apne maal se milwane leke jayega? 😏</h2>

<p>Agar nahi le jana hai to NO pe click kar 😜</p>

<button id="yes" onclick="yesClick()">Yes</button>

<button id="no" onmouseover="moveButton()" ontouchstart="moveButton()">No</button>

</div>

`

}

function moveButton(){

let btn=document.getElementById("no")

let x=Math.random()*(window.innerWidth-120)
let y=Math.random()*(window.innerHeight-60)

btn.style.left=x+"px"
btn.style.top=y+"px"

}

function yesClick(){

document.body.innerHTML=`

<div class="card">

<h1>Yay! ❤️</h1>

<h2>Tune Ha Bol Diya</h2>

<p>Tu Mera Sabse Accha Dost Hai 🤝</p>

</div>

`

}

function hearts(){

let heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>{heart.remove()},5000)

}

setInterval(hearts,500)

</script>

</head>

<body>

<div class="card">

<h1>Rahul Mere Bhai 🤝</h1>

<p>Mai tujhse ek sawal poochne ja raha hu</p>

<p>Uska jawab YES me dena ❤️</p>

<button onclick="nextPage()">OK</button>

</div>

</body>

</html>
